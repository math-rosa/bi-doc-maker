ShortDescription: Gera documentação técnica e executiva de projetos Power BI PBIP localmente.
Description: |-
  BI Doc Maker é um aplicativo desktop Windows que lê projetos Power BI no formato PBIP
  e gera documentação técnica e executiva em Markdown, DOCX e HTML — tudo processado
  localmente, sem enviar metadados para a nuvem.

  Cobre tabelas, colunas, medidas DAX, Power Query, relacionamentos, grupos de cálculo,
  perspectivas, RLS/OLS e parâmetros M direto dos arquivos TMDL do PBIP.
