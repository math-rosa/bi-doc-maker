ShortDescription: Generate technical and executive documentation for Power BI PBIP projects locally.
Description: |-
  BI Doc Maker is a Windows desktop app that reads Power BI projects in the PBIP format
  and generates technical and executive documentation in Markdown, DOCX and HTML —
  all processed locally, without sending metadata to the cloud.

  Covers tables, columns, DAX measures, Power Query, relationships, calculation groups,
  perspectives, RLS/OLS and M parameters straight from the PBIP TMDL files.
